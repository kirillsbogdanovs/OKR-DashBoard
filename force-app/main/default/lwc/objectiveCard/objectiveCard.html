<template>
    <div class="objective-card">
        <!-- Header with title and status badge -->
        <div class="objective-header">
            <h3 class="objective-title" onclick={handleSelect}>{objective.Name}</h3>
        </div>

        <!-- Key Results section -->
        <div class="key-results-section">
            <h4 class="section-heading">Key Results</h4>
            
            <template if:true={keyResults.length}>
                <div class="key-results-grid">
                    <template for:each={keyResults} for:item="kr">
                        <c-key-result-item
                            key={kr.keyResult.Id}
                            key-result-wrapper={kr}>
                        </c-key-result-item>
                    </template>
                </div>
            </template>

            <template if:false={keyResults.length}>
                <div class="empty-state">No key results yet</div>
            </template>
        </div>
    </div>
</template>
