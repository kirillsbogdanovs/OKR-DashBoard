<template>
    <template if:true={keyResultWrapper}>
        <div class="slds-box slds-m-vertical_small">

            <!-- Targets -->
            <template if:true={hasTargets}>
                <ul class="slds-list_dotted slds-m-left_medium">
                <template for:each={targetsWithKey} for:item="t">
                    <li key={t._key} class="slds-m-vertical_xx-small">
                    <span class="slds-text-body_small">
                        <strong>{t.objectType}:</strong> {t.current} / {t.target}
                    </span>
                    </li>
                </template>
                </ul>
            </template>

            <!-- No targets -->
            <template if:false={hasTargets}>
                <div class="slds-text-color_weak slds-m-top_xx-small">
                    No targets configured for this Key Result.
                </div>
            </template>

        </div>
    </template>
</template>
