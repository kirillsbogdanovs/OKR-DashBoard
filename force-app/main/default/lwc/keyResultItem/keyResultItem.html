<template>
    <div class="key-result-card">
        <div class="key-result-name">{kr.Name}</div>
        <div class="kr-status">
            <lightning-badge label={kr.Status__c}></lightning-badge>
        </div>

            <!-- Targets -->
            <template if:true={hasTargets}>
                <ul class="targets-list">
                <template for:each={targetsWithKey} for:item="t">
                    <li key={t._key} class="target-item">
                    <span class="target-count">
                        <strong>{t.objectType}:</strong> {t.current} / {t.target}
                    </span>
                    </li>
                </template>
                </ul>
            </template>

            <!-- No targets -->
            <template if:false={hasTargets}>
                <div class="no-targets">
                    No targets configured for this Key Result.
                </div>
            </template>

        </div>
</template>
