<template>
  <lightning-card title="New Key Result">
    <div class="slds-p-around_medium">

      <lightning-combobox
        data-id="objective"
        label="Objective"
        value={objectiveId}
        options={objectiveOptions}
        onchange={handleObjectiveChange}
        required>
      </lightning-combobox>

      <lightning-input
        data-id="name"
        label="Key Result Name"
        value={name}
        onchange={handleNameChange}
        required>
      </lightning-input>

      <lightning-combobox
        data-id="status"
        label="KR Status"
        value={status}
        options={statusOptions}
        onchange={handleStatusChange}>
      </lightning-combobox>

      <!-- Targets section -->
            <div class="slds-m-top_medium">
                <div class="slds-text-title_bold slds-m-bottom_x-small">Targets</div>

                <template for:each={targetRows} for:item="row">
                    <div key={row.id} class="slds-grid slds-gutters slds-m-bottom_small slds-wrap">

                        <!-- Object Type -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                            <lightning-combobox
                                label="Object Type"
                                value={row.objectType}
                                options={objectOptions}
                                data-id={row.id}
                                onchange={handleObjectTypeChange}
                                required>
                            </lightning-combobox>
                        </div>

                        <!-- Target value -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                            <lightning-input
                                type="number"
                                label="Target"
                                value={row.target}
                                data-id={row.id}
                                onchange={handleTargetChange}
                                required>
                            </lightning-input>
                        </div>

                        <!-- Remove row -->
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-12 slds-m-top_large">
                            <lightning-button-icon
                                icon-name="utility:delete"
                                alternative-text="Remove"
                                title="Remove"
                                data-id={row.id}
                                onclick={removeRow}>
                            </lightning-button-icon>
                        </div>
                    </div>
                </template>

                <lightning-button
                    class="slds-m-top_small"
                    label="Add Target"
                    icon-name="utility:add"
                    onclick={addRow}>
                </lightning-button>
            </div>

        </div>

    <footer class="slds-modal__footer">
      <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
      <lightning-button variant="brand" label="Save" onclick={handleSave}></lightning-button>
    </footer>
  </lightning-card>
</template>
